<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>El Bosque Mágico del Chihuahua 🐶🌲</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            background: #0b301a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            height: 100vh;
            width: 100vw;
        }
        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        /* Bosque detallado con textura de pasto, flores y tierra */
        #game-world {
            width: 3000px;
            height: 3000px;
            position: absolute;
            background-color: #114123;
            background-image: 
                radial-gradient(#16522c 10%, transparent 11%),
                radial-gradient(#0d361c 15%, transparent 16%),
                linear-gradient(45deg, rgba(255,255,255,0.02) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.02) 75%);
            background-size: 60px 60px, 120px 120px, 40px 40px;
            background-position: 0 0, 40px 40px, 0 0;
            top: 0;
            left: 0;
            will-change: transform;
        }
        /* Elementos del decorativos del bosque */
        .decor {
            position: absolute;
            font-size: 18px;
            opacity: 0.6;
            pointer-events: none;
        }
        /* Árboles mejorados y más bonitos */
        .tree {
            position: absolute;
            font-size: 75px;
            cursor: pointer;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 12px 8px rgba(0,0,0,0.5));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .tree::after {
            content: '✨';
            position: absolute;
            font-size: 20px;
            top: -10px;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(0.8); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 1; }
        }
        .tree:active {
            transform: scale(1.15);
        }
        /* El perrito chihuahua café */
        #player {
            position: absolute;
            width: 65px;
            height: 65px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.3));
        }
        /* Animación de correr */
        .running {
            animation: dogRun 0.25s infinite alternate ease-in-out;
        }
        @keyframes dogRun {
            0% { transform: translateY(0) scaleY(1); }
            100% { transform: translateY(-8px) scaleY(0.95); }
        }
        /* Contenedor del Joystick */
        #joystick-container {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.12);
            border: 3px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            z-index: 100;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        #stick {
            width: 60px;
            height: 60px;
            background: #ff4a7d;
            border-radius: 50%;
            box-shadow: 0 6px 14px rgba(0,0,0,0.5);
        }
        /* Interfaz de las cartas */
        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 24px;
            backdrop-filter: blur(5px);
        }
        .card {
            background: #fff;
            padding: 30px 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: openCard 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 6px solid #ff4a7d;
        }
        @keyframes openCard {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .card h3 { font-size: 45px; margin-bottom: 12px; }
        .card p { color: #222; font-size: 16px; line-height: 1.5; margin-bottom: 25px; font-weight: 500; }
        .close-btn {
            background: #ff4a7d;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 5px 15px rgba(255, 74, 125, 0.4);
            cursor: pointer;
        }
        /* Instrucciones superiores */
        .instruction {
            position: fixed;
            top: 25px;
            width: 85%;
            left: 7.5%;
            text-align: center;
            color: white;
            pointer-events: none;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 50px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="instruction">🐾 ¡Ayuda al perrito a correr por el bosque y descubre los árboles mágicos! 🌲💌</div>

<div id="viewport">
    <div id="game-world">
        <!-- Nuestro perrito chihuahua café -->
        <div id="player">🐕🤎</div>

        <!-- Árboles Decorados y Distribuidos -->
        <div class="tree" style="top: 1350px; left: 1250px;" onclick="showCard('¡Encontraste el primer recuerdo! 💖 Aquí es donde nuestra hermosa historia comenzó.')">🌲</div>
        <div class="tree" style="top: 1650px; left: 1650px;" onclick="showCard('Eres mi persona favorita en todo el universo entero. No lo olvides nunca. 🥰')">🌲</div>
        <div class="tree" style="top: 1150px; left: 1700px;" onclick="showCard('Me fascina cómo logras hacerme sonreír con cualquier cosita que dices o haces. ✨')">🌲</div>
        <div class="tree" style="top: 1750px; left: 1200px;" onclick="showCard('Cada rincón de este bosque guarda un momento mágico y lindo que he vivido a tu lado. 🧸')">🌲</div>
        <div class="tree" style="top: 1450px; left: 1550px;" onclick="showCard('¡Llegaste al corazón del bosque! Mi lugar seguro y mi felicidad siempre serás tú. 💌❤️')">🌲</div>
    </div>
</div>

<div id="joystick-container">
    <div id="stick"></div>
</div>

<div id="modal" onclick="closeCard()">
    <div class="card" onclick="event.stopPropagation()">
        <h3>💌</h3>
        <p id="card-text"></p>
        <button class="close-btn" onclick="closeCard()">Cerrar con amor</button>
    </div>
</div>

<script>
    const world = document.getElementById('game-world');
    const player = document.getElementById('player');
    const stick = document.getElementById('stick');
    const joystickContainer = document.getElementById('joystick-container');

    // Generar flores y arbustos aleatorios para rellenar el bosque y detallarlo
    const decors = ['🌸', '🌼', '🌿', '🌱', '🍄'];
    for (let i = 0; i < 150; i++) {
        const d = document.createElement('div');
        d.className = 'decor';
        d.innerText = decors[Math.floor(Math.random() * decors.length)];
        d.style.top = Math.random() * 2800 + 100 + 'px';
        d.style.left = Math.random() * 2800 + 100 + 'px';
        world.appendChild(d);
    }

    // Posición inicial centradita
    let pX = 1450;
    let pY = 1450;
    
    let moveX = 0;
    let moveY = 0;
    let isMoving = false;

    function updateCamera() {
        player.style.left = pX + 'px';
        player.style.top = pY + 'px';
        
        let camX = -pX + (window.innerWidth / 2) - 32;
        let camY = -pY + (window.innerHeight / 2) - 32;
        world.style.transform = `translate3d(${camX}px, ${camY}px, 0)`;
    }

    // Controles táctiles del Joystick
    joystickContainer.addEventListener('touchstart', (e) => {
        isMoving = true;
        player.classList.add('running');
        handleJoystick(e.touches[0]);
    }, {passive: true});

    document.addEventListener('touchmove', (e) => {
        if (!isMoving) return;
        handleJoystick(e.touches[0]);
    }, {passive: false});

    document.addEventListener('touchend', () => {
        isMoving = false;
        player.classList.remove('running');
        moveX = 0;
        moveY = 0;
        stick.style.transform = 'translate(0px, 0px)';
    });

    function handleJoystick(touch) {
        const rect = joystickContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let deltaX = touch.clientX - centerX;
        let deltaY = touch.clientY - centerY;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        const maxDistance = 40;

        if (distance > maxDistance) {
            deltaX = (deltaX / distance) * maxDistance;
            deltaY = (deltaY / distance) * maxDistance;
        }

        stick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

        // Orientar el perrito a la izquierda o derecha según avance
        if (deltaX > 5) player.style.transform = 'scaleX(1)';
        if (deltaX < -5) player.style.transform = 'scaleX(-1)';

        moveX = (deltaX / maxDistance) * 7.5;
        moveY = (deltaY / maxDistance) * 7.5;
    }

    function gameLoop() {
        if (isMoving) {
            pX += moveX;
            pY += moveY;

            if (pX < 100) pX = 100;
            if (pX > 2900) pX = 2900;
            if (pY < 100) pY = 100;
            if (pY > 2900) pY = 2900;

            updateCamera();
        }
        requestAnimationFrame(gameLoop);
    }

    function showCard(text) {
        document.getElementById('card-text').innerText = text;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeCard() {
        document.getElementById('modal').style.display = 'none';
    }

    updateCamera();
    requestAnimationFrame(gameLoop);
</script>
</body>
                                                                                                                                                                         </html>
