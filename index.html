<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bosque de Recuerdos 🌲</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            background: #0e4526;
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none;
            height: 100vh;
            width: 100vw;
        }
        /* Contenedor de la cámara */
        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        /* El mapa gigante del bosque */
        #game-world {
            width: 2500px;
            height: 2500px;
            position: absolute;
            background-color: #165b33;
            background-image: radial-gradient(#1f7a48 15%, transparent 16%),
                              radial-gradient(#1a6b3e 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            top: 0;
            left: 0;
        }
        /* Los árboles misteriosos */
        .tree {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 6px 4px rgba(0,0,0,0.4));
        }
        /* Nuestro personaje personalizado */
        #player {
            position: absolute;
            width: 50px;
            height: 50px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
        }
        /* Control Joystick Fijo */
        #joystick-area {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 130px;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            z-index: 100;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #stick {
            width: 55px;
            height: 55px;
            background: #ff4a7d;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        /* Ventanas de las cartas */
        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .card h3 { font-size: 40px; margin-bottom: 10px; }
        .card p { color: #444; font-size: 16px; line-height: 1.4; margin-bottom: 15px; }
        .close-btn {
            background: #ff4a7d;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            font-weight: bold;
        }
        /* Instrucción Superior */
        .instruction {
            position: fixed;
            top: 20px;
            width: 90%;
            left: 5%;
            text-align: center;
            color: white;
            pointer-events: none;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 10px;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="instruction">¡Usa el joystick rosa para caminar y toca los árboles! 🌲✨</div>

<div id="viewport">
    <div id="game-world">
        <!-- Nuestro personaje: Cuerpo negro 👤 con casco blanco ⚪ -->
        <div id="player">👤⚪</div>

        <!-- Árboles distribuidos estratégicamente alrededor del centro -->
        <div class="tree" style="top: 1000px; left: 850px;" onclick="showCard('¡Encontraste el primer recuerdo! 💖 Here comenzó nuestra historia bonita.')">🌲</div>
        <div class="tree" style="top: 1100px; left: 1450px;" onclick="showCard('Eres mi persona favorita en todo el universo entero. 🥰')">🌲</div>
        <div class="tree" style="top: 800px; left: 1200px;" onclick="showCard('Me fascina cómo logras hacerme sonreír con cualquier detalle. ✨')">🌲</div>
        <div class="tree" style="top: 1450px; left: 1000px;" onclick="showCard('Cada pedacito de este bosque guarda un momento lindo a tu lado. 🧸')">🌲</div>
        <div class="tree" style="top: 1300px; left: 1300px;" onclick="showCard('¡Llegaste al corazón del bosque! Mi lugar seguro siempre serás tú. 💌❤️')">🌲</div>
    </div>
</div>

<div id="joystick-area">
    <div id="stick"></div>
</div>

<div id="modal" onclick="closeCard()">
    <div class="card" onclick="event.stopPropagation()">
        <h3>💌</h3>
        <p id="card-text"></p>
        <button class="close-btn" onclick="closeCard()">Cerrar</button>
    </div>
</div>

<script>
    const world = document.getElementById('game-world');
    const player = document.getElementById('player');
    const stick = document.getElementById('stick');
    const joystickArea = document.getElementById('joystick-area');

    // Empezamos exactamente en el centro del mapa gigante
    let pX = 1150;
    let pY = 1150;
    
    let moveX = 0;
    let moveY = 0;
    let isMoving = false;

    // Centrar la cámara en el personaje al cargar
    function updateCamera() {
        player.style.left = pX + 'px';
        player.style.top = pY + 'px';
        
        let camX = -pX + (window.innerWidth / 2) - 25;
        let camY = -pY + (window.innerHeight / 2) - 25;
        world.style.transform = `translate(${camX}px, ${camY}px)`;
    }

    // Eventos del Joystick corregidos para Móvil
    joystickArea.addEventListener('touchstart', (e) => {
        isMoving = true;
        handleJoystick(e.touches[0]);
    });

    joystickArea.addEventListener('touchmove', (e) => {
        if (!isMoving) return;
        handleJoystick(e.touches[0]);
    });

    joystickArea.addEventListener('touchend', () => {
        isMoving = false;
        moveX = 0;
        moveY = 0;
        stick.style.transform = 'translate(0px, 0px)';
    });

    function handleJoystick(touch) {
        const rect = joystickArea.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let deltaX = touch.clientX - centerX;
        let deltaY = touch.clientY - centerY;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        const maxDistance = 35;

        if (distance > maxDistance) {
            deltaX = (deltaX / distance) * maxDistance;
            deltaY = (deltaY / distance) * maxDistance;
        }

        stick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

        // Definir la velocidad de movimiento de la cámara
        moveX = (deltaX / maxDistance) * 8;
        moveY = (deltaY / maxDistance) * 8;
    }

    // Bucle del juego
    function gameLoop() {
        if (isMoving) {
            pX += moveX;
            pY += moveY;

            // Límites para que no se salga del mapa verde
            if (pX < 50) pX = 50;
            if (pX > 2400) pX = 2400;
            if (pY < 50) pY = 50;
            if (pY > 2400) pY = 2400;

            updateCamera();
        }
        requestAnimationFrame(gameLoop);
    }

    function showCard(text) {
        document.getElementById('card-text').innerText = text;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeCard() {
        document.getElementById('modal').style.display = 'none';
    }

    // Inicializar juego en el centro perfecto
    updateCamera();
    requestAnimationFrame(gameLoop);
</script>
</body>
    </html>
