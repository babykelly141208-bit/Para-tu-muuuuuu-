<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bosque Mágico</title>
    <style>
        body { margin: 0; background: #0e4526; color: white; font-family: sans-serif; overflow: hidden; }
        #app { width: 100vw; height: 100vh; position: relative; }
        #character { position: absolute; top: 50%; left: 50%; font-size: 40px; z-index: 10; }
        .tree { position: absolute; font-size: 60px; cursor: pointer; }
        #msg { position: fixed; top: 10px; width: 100%; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

<div id="msg">¡Toca los árboles para ver mensajes! 🌲✨</div>
<div id="app">
    <div id="character">👤⚪</div>
    <div class="tree" style="top: 20%; left: 20%;" onclick="alert('💖 Nuestra historia empezó aquí.')">🌲</div>
    <div class="tree" style="top: 20%; left: 70%;" onclick="alert('🥰 Eres mi persona favorita.')">🌲</div>
    <div class="tree" style="top: 70%; left: 20%;" onclick="alert('✨ Gracias por ser tú.')">🌲</div>
    <div class="tree" style="top: 70%; left: 70%;" onclick="alert('🧸 Te quiero muchísimo.')">🌲</div>
</div>

<script>
    // Movimiento básico al tocar la pantalla
    document.addEventListener('touchstart', (e) => {
        const char = document.getElementById('character');
        char.style.left = e.touches[0].clientX - 20 + 'px';
        char.style.top = e.touches[0].clientY - 20 + 'px';
    });
</script>
</body>
</html>
