<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Mecánico</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#141414;
    color:white;
    overflow:hidden;
}

#inicio,#taller{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#taller{
    display:none;
    background:#222;
}

h1{
    font-size:55px;
    margin-bottom:15px;
}

p{
    opacity:.8;
    margin-bottom:40px;
    text-align:center;
    max-width:500px;
}

button{
    padding:15px 40px;
    border:none;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
    background:#666;
    color:white;
    transition:.3s;
}

button:hover{
    background:#888;
}

#garaje{
    width:90%;
    max-width:900px;
    height:500px;
    background:#2f2f2f;
    border:5px solid #555;
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

#luz{
    position:absolute;
    top:0;
    right:0;
    width:250px;
    height:100%;
    background:linear-gradient(to left,rgba(255,230,150,.35),transparent);
}

#moto{
    position:absolute;
    bottom:70px;
    left:50%;
    transform:translateX(-50%);
    font-size:120px;
}
</style>
</head>

<body>

<div id="inicio">
<h1>El Mecánico</h1>

<p>
Hay máquinas que esperan ser reconstruidas.
Hoy, una de ellas espera por ti.
</p>

<button onclick="comenzar()">
Comenzar
</button>
</div>

<div id="taller">

<div id="garaje">

<div id="luz"></div>

<div id="moto">
🏍️
</div>

</div>

</div>

<script>

function comenzar(){

document.getElementById("moto").onclick = function(){

let revision = document.createElement("div");

revision.innerHTML = `
<div style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:30px;
border:2px solid #777;
border-radius:15px;
text-align:center;
width:300px;
">

<h2>Revisión de la moto</h2>

<p>
Estado actual:
<br>
🔴 Motor: dañado
<br>
🟡 Batería: baja
<br>
🟢 Chasis: estable
</p>

<button onclick="this.parentElement.parentElement.remove()">
Cerrar
</button>

</div>
`;

document.getElementById("garaje").appendChild(revision);

    }
    }

</script>

</body>
</html>
