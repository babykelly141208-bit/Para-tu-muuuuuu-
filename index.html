<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bosque de Recuerdos</title>
    <style>
        body { margin: 0; background: #0e4526; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #game { width: 2000px; height: 2000px; position: relative; background: radial-gradient(circle, #1a6e3e 0%, #0e4526 100%); transition: transform 0.05s linear; }
        .tree { position: absolute; font-size: 70px; cursor: pointer; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); }
        #player { position: absolute; top: 1000px; left: 1000px; font-size: 50px; z-index: 10; transition: transform 0.1s; }
        #joystick { position: fixed; bottom: 40px; right: 40px; width: 130px; height: 130px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 3px solid rgba(255,255,255,0.5); z-index: 100; }
        #stick { position: absolute; top: 35px; left: 35px; width: 60px; height: 60px; background: #ff4a7d; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .instruction { position: fixed; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; font-weight: bold; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

<div class="instruction">¡Mueve el joystick rosa para explorar el bosque y toca los árboles! 🌲✨</div>

<div id="game">
    <div id="player">👤⚪</div>
    <!-- Árboles con mensajes -->
    <div class="tree" style="top: 400px; left: 500px;" onclick="showCard('Aquí empezó todo... nuestro primer encuentro. 💖')">🌲</div>
    <div class="tree" style="top: 1500px; left: 300px;" onclick="showCard('Eres mi persona favorita en todo el mundo. 🥰')">🌲</div>
    <div class="tree" style="top: 1200px; left: 1600px;" onclick="showCard('Me encanta cómo me haces sonreír sin darte cuenta. ✨')">🌲</div>
    <div class="tree" style="top: 600px; left: 1400px;" onclick="showCard('Nunca olvides que aquí tienes a alguien que te adora. 🧸')">🌲</div>
    <div class="tree" style="top: 1100px; left: 1000px;" onclick="showCard('¡Este es el corazón del bosque, donde guardo todo mi amor por ti! 💌')">🌲</div>
</div>

<div id="joystick"><div id="stick"></div></div>
<div id="modal" onclick="this.style.display='none'"><div class="card" id="card-text"></div></div>

<script>
    const player = document.getElementById('player');
    const game = document.getElementById('game');
    const stick = document.getElementById('stick');
    let posX = 1000, posY = 1000;

    function updateView() {
        game.style.transform = `translate(${-posX + window.innerWidth/2}px, ${-posY + window.innerHeight/2}px)`;
        player.style.left = posX + 'px';
        player.style.top = posY + 'px';
    }

    document.getElementById('joystick').addEventListener('touchmove', (e) => {
        let touch = e.touches[0];
        let rect = e.target.getBoundingClientRect();
        let dx = (touch.clientX - (rect.left + 65)) / 5;
        let dy = (touch.clientY - (rect.top + 65)) / 5;
        posX += dx; posY += dy;
        updateView();
    });

    function showCard(text) {
        document.getElementById('card-text').innerHTML = '<h3>💌</h3>' + text;
        document.getElementById('modal').style.display = 'flex';
    }
    updateView();
</script>
</body>
</html>
